name: Docker Compose

on:
  push:
  pull_request:

jobs:
  smoke-test:
    name: Build and start Compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build --wait --wait-timeout 180

      - name: Verify health endpoints
        run: |
          curl --fail --show-error --silent http://127.0.0.1:3000/health
          curl --fail --show-error --silent http://127.0.0.1:3001/health

      - name: Show service status
        if: always()
        run: docker compose ps

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down services
        if: always()
        run: docker compose down --volumes --remove-orphans
